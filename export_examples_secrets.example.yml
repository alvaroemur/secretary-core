# export_examples_secrets.example.yml — TEMPLATE for the private secrets file.
#
# Copy this file to `export_examples_secrets.yml` (gitignored) and replace the
# example patterns with your REAL sensitive values. The exporter
# (`secretary core export-examples`) reads the private file and applies these
# `redact` rules BEFORE the public rules in `secretary/data/export_examples_map.yml`.
#
#   cp export_examples_secrets.example.yml export_examples_secrets.yml
#   # edit export_examples_secrets.yml with your real values
#
# NEVER commit `export_examples_secrets.yml` — it is in `.gitignore`. This template
# holds ONLY placeholders and documents the schema.
#
# Schema — a `redact:` list of rules, each either:
#   - {pattern: "<literal>", replacement: "<placeholder>", note: "..."}   # literal
#   - {regex:   "<regex>",   replacement: "<placeholder>", note: "..."}   # regex
#
# ORDER MATTERS: rules are applied top-to-bottom. Put a more specific rule (e.g. a
# Drive mount path that embeds an email) BEFORE the plain email rule.

redact:
  # --- Google Drive local mount path (BEFORE the bare-email rule) ---
  - pattern: "GoogleDrive-REAL_PERSONAL_EMAIL"
    replacement: "GoogleDrive-your.personal.email@gmail.com"
    note: "macOS CloudStorage mount for your personal Drive."

  # --- Your emails ---
  - pattern: "REAL_PERSONAL_EMAIL"
    replacement: "your.personal.email@gmail.com"
    note: "Your personal email."
  - pattern: "REAL_WORK_EMAIL"
    replacement: "your.work.email@company.com"
    note: "Your work / corporate email."

  # --- Private instance / deploy repos (NOT the shared engine) ---
  - pattern: "REAL_OWNER/your-instance-repo"
    replacement: "yourusername/cowork-secretary"
    note: "Your private instance repo slug. NOT alvaroemur/secretary-core."
  - pattern: "REAL_OWNER/wiki"
    replacement: "yourusername/wiki"
    note: "Your personal wiki deploy repo (instance-specific)."
  - pattern: "REAL_OWNER/axon"
    replacement: "yourusername/axon"
    note: "Any other instance-specific repo."

  # --- Google Drive folder ids ---
  - pattern: "REAL_TACTIQ_FOLDER_ID"
    replacement: "YOUR_TACTIQ_FOLDER_ID"
    note: "Root Drive folder id of your Tactiq meeting transcripts."
  - pattern: "REAL_DRIVE_FOLDER_ID"
    replacement: "YOUR_DRIVE_FOLDER_ID"
    note: >-
      Any other real Google Drive folder id that appears in your playbooks/skills
      (e.g. folders referenced by the drive-crawler). Add one rule per id.

  # --- Phones (optional; a generic +51 rule already lives in the public map) ---
  # - pattern: "REAL_PHONE_NUMBER"
  #   replacement: "+00 000 000 000"
  #   note: "A specific phone number not covered by the public phone regex."
